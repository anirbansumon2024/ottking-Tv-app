name: 2. Flutter Android CI build fixed

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      HMAC_SECRET_KEY: ${{ secrets.HMAC_SECRET_KEY }}
      ENCRYPTION_KEY: ${{ secrets.HMAC_SECRET_KEY }}
      KEYSTORE_PASSWORD: "ottking_secure_pass_2026"
      KEY_ALIAS: "ottking_alias"
      KEY_PASSWORD: "ottking_secure_pass_2026"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { channel: 'stable', cache: true }

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5261c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8bdb" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo "SDK licenses accepted."

      - name: Setup Static Signing Key
        run: |
          mkdir -p signing
          if [ ! -f signing/key.jks ]; then
            keytool -genkeypair -v -keystore signing/key.jks \
              -storepass $KEYSTORE_PASSWORD -keypass $KEY_PASSWORD \
              -alias $KEY_ALIAS -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=oTtking, OU=Dev, O=oTtking, L=Dhaka, S=Dhaka, C=BD"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add signing/key.jks
            git commit -m "chore: save static signing key"
            git push
          fi

      - name: Create key.properties
        run: |
          cat > android/app/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../../signing/key.jks
          EOF

      - name: Build APK
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=HMAC_SECRET_KEY="$HMAC_SECRET_KEY" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY"

      - name: Push APK to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: "v1.0.${{ github.run_number }}"
          name: "oTtking App Release v1.0.${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true